apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik

rules:
- apiGroups: [""]
  resources:
    - services
    - endpoints
    - secrets
    - pods
    - nodes
  verbs:
    - get
    - list
    - watch

- apiGroups: ["discovery.k8s.io"]
  resources:
    - endpointslices
  verbs:
    - get
    - list
    - watch

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - ingressclasses
  verbs:
    - get
    - list
    - watch
