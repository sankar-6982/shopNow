apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik

rules:
- apiGroups: [""]
  resources:
    - services
    - endpoints
    - secrets
    - pods
  verbs: ["get","list","watch"]

- apiGroups: [""]
  resources:
    - nodes
  verbs: ["get","list","watch"]

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - ingressclasses
  verbs: ["get","list","watch"]