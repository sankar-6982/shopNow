apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopnow
  labels:
    app: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: 386315605351.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80