apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: shopnow

  labels:
    app: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:

      - name: backend

        image: 386315605351.dkr.ecr.ap-south-1.amazonaws.com/backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:

        - name: NODE_ENV
          value: production

        - name: MONGODB_URI
          value: "YOUR_MONGODB_ATLAS_URI"

        - name: JWT_SECRET
          value: "YOUR_JWT_SECRET"