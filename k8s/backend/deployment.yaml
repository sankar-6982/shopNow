apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: shopnow

  labels:
    app: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:

      - name: backend

        image: 386315605351.dkr.ecr.ap-south-1.amazonaws.com/backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:
          - name : MONGODB_URI
            valueFrom:
              secretKeyRef:
                name: mongodb-secret
                key: MONGODB_URI