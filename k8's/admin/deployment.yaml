apiVersion: apps/v1
kind: Deployment

metadata:
  name: admin
  namespace: shopnow

  labels:
    app: admin

spec:
  replicas: 2

  selector:
    matchLabels:
      app: admin

  template:
    metadata:
      labels:
        app: admin

    spec:
      containers:

      - name: admin

        image: 386315605351.dkr.ecr.ap-south-1.amazonaws.com/admin:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80